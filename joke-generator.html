<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .joke {
            margin: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="joke" id="joke">Press the button to fetch a joke!</div>
    <button id="jokeButton">Get Joke</button>

    <script>
        document.getElementById('jokeButton').addEventListener('click', fetchJoke);

        function fetchJoke() {
            fetch('https://v2.jokeapi.dev/joke/Any')
                .then(response => response.json())
                .then(data => {
                    const jokeElement = document.getElementById('joke');
                    if(data.setup) {
                        jokeElement.innerHTML = `${data.setup} <br><br> ${data.delivery}`;
                    } else {
                        jokeElement.innerHTML = data.joke;
                    }
                })
                .catch(error => {
                    console.error('Error fetching joke:', error);
                });
        }
    </script>
</body>
</html>
